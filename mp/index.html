<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rugby XV Draft: Multiplayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lobby.css">
</head>
<body>
<main>

    <div class="topbar">
        <div class="bug">
            <h1>Rugby XV Draft</h1>
            <span class="sub">Multiplayer</span>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Switch theme">Light</button>
    </div>
    <div class="rule-line"></div>

    <!-- ══ LOBBY VIEW ══ -->
    <div id="lobbyView">

        <section class="block">
            <p class="eyebrow">You</p>
            <div class="you-row">
                <div class="name">
                    <label class="field" for="name">Display name</label>
                    <input type="text" id="name" maxlength="20" value="" placeholder="Your name" autocomplete="off">
                </div>
                <div>
                    <label class="field" for="kit1">Kit</label>
                    <div class="kits">
                        <input type="color" id="kit1" value="#16E0CD" aria-label="Primary kit colour">
                        <input type="color" id="kit2" value="#FFC24D" aria-label="Second kit colour">
                    </div>
                </div>
            </div>
            <div class="flash" id="youFlash">
                <span class="num">XV</span>
                <span class="who" id="youName">Your name</span>
            </div>
        </section>

        <section class="block">
            <div class="seg" role="group" aria-label="Create or join">
                <button id="pathCreate" aria-pressed="true">Create draft
                    <span class="hint">Set the options and start a room</span></button>
                <button id="pathJoin" aria-pressed="false">Join draft
                    <span class="hint">Enter a room code</span></button>
            </div>
        </section>

        <div id="joinPane" class="hidden">
            <section class="block">
                <p class="eyebrow">Room code</p>
                <div class="join-row">
                    <input type="text" id="join" maxlength="4" placeholder="CODE" autocomplete="off" aria-label="Room code">
                    <button class="cta" id="joinBtn"><span>Join</span></button>
                </div>
            </section>
        </div>

        <div id="createPane">

        <section class="block">
            <p class="eyebrow">Mode</p>
            <div class="seg" role="group" aria-label="Game mode">
                <button id="modeCareer" aria-pressed="true">Career peak
                    <span class="hint">One card per player, best rating</span></button>
                <button id="modeTournament" aria-pressed="false">Tournament
                    <span class="hint">Every World Cup version is a pick</span></button>
            </div>
        </section>

        <section class="block">
            <p class="eyebrow">Users <small>how many people are drafting</small></p>
            <div class="stepper-row">
                <div class="stepper">
                    <label class="field">Human users</label>
                    <div class="cap">
                        <button id="sizeDown" aria-label="Fewer users">&minus;</button>
                        <span class="num" id="sizeNum">4</span>
                        <button id="sizeUp" aria-label="More users">+</button>
                    </div>
                </div>
                <div class="stepper">
                    <label class="field">Competitions in season</label>
                    <div class="cap">
                        <button id="seasonDown" aria-label="Shorter season">&minus;</button>
                        <span class="num" id="seasonNum">3</span>
                        <button id="seasonUp" aria-label="Longer season">+</button>
                    </div>
                </div>
            </div>
            <p class="format-line" id="formatLine"></p>
        </section>

        <section class="block" id="yearsBlock">
            <p class="eyebrow">Years</p>
            <div class="years-wrap">
                <div class="year-ticks" id="yearTicks"></div>
                <div class="slider">
                    <div class="track"></div>
                    <div class="fill" id="yearFill"></div>
                    <input type="range" id="yMin" min="0" max="9" step="1" value="0" aria-label="Earliest tournament">
                    <input type="range" id="yMax" min="0" max="9" step="1" value="9" aria-label="Latest tournament">
                </div>
            </div>
        </section>

        <section class="block">
            <p class="eyebrow">Nations pool <small>which countries players can be drafted from</small></p>
            <div class="chips" id="geoChips"></div>
        </section>

        <section class="block">
            <p class="eyebrow">Rules</p>
            <div class="rules" id="ruleList"></div>
        </section>

        <p class="eyebrow">Pool check</p>
        <div class="strap" id="strap">
            <span class="live-dot"></span>
            <span id="strapText">Reading the pool...</span>
        </div>

        <button class="cta" id="create"><span>Create room</span></button>

        </div>

        <p class="status" id="lobbyStatus"></p>

    </div>

    <!-- ══ DRAFT VIEW ══ -->
    <div id="draftView" class="hidden">

        <div id="turnBar" class="turn-bar hidden"></div>

        <div class="draft-tabs" role="group" aria-label="Draft sections">
            <button id="tabXV" aria-pressed="true">Your XV</button>
            <button id="tabBoard" aria-pressed="false">Big Board</button>
            <button id="tabAll" aria-pressed="false">Full Draft</button>
        </div>

        <div id="pickBanner" class="pick-banner hidden">
            <span>Picking <strong id="bannerSlot"></strong></span>
            <button id="bannerCancel">Cancel</button>
        </div>

        <!-- Your XV -->
        <div id="paneXV">
            <p class="eyebrow">Your XV <small id="squadProgress"></small></p>
            <div class="teamsheet" id="teamsheet"></div>
        </div>

        <!-- Big Board / Full Draft share the list body -->
        <div id="paneList" class="hidden">
            <input type="text" id="panelSearch" placeholder="Search name, nation or year" autocomplete="off" aria-label="Search players">
            <div class="axis-row">
                <span class="axis-label">Group by</span>
                <div class="axis" role="group" aria-label="Group list by">
                    <button id="axisNation" aria-pressed="true">Nation</button>
                    <button id="axisPosition" aria-pressed="false">Position</button>
                </div>
            </div>
            <p class="list-hint" id="listHint"></p>
            <div class="panel-body" id="panelBody"></div>
        </div>

        <p class="status" id="draftStatus"></p>
        <button class="cta ghost" id="backToRoom"><span>Back to room</span></button>
    </div>

    <!-- ══ ROOM VIEW ══ -->
    <div id="roomView" class="hidden">
        <p class="eyebrow">Room</p>
        <div class="room-code" id="roomCode">----<small>share this code</small></div>
        <div class="strap ready" id="roomStrap"><span id="roomStrapText"></span></div>
        <p class="season-line" id="seasonLine"></p>
        <ul class="members" id="members"></ul>
        <div id="lotteryPanel" class="lottery hidden">
            <p class="eyebrow">Draft order</p>
            <ol class="lottery-list" id="lotteryList"></ol>
        </div>
        <button class="cta hidden" id="startDraft"><span>Start draft</span></button>
        <button class="cta hidden" id="resumeDraft"><span>Return to draft</span></button>
        <p class="status" id="startHint"></p>
        <button class="cta ghost" id="leave"><span>Leave room</span></button>
        <button class="cta danger hidden" id="closeRoom"><span>Close room</span></button>
        <p class="status" id="roomStatus"></p>
    </div>

</main>

<!-- Firebase compat SDK (CDN, no build step) -->
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-database-compat.js"></script>

<!-- Data and logic. Order matters: data and engines before net and lobby. -->
<script>window.MP_DATA_VERSION = "v1-mp-lobby";</script>
<script src="../data.js"></script>
<script src="engine.js"></script>
<script src="rules.js"></script>
<script src="draft.js"></script>
<script src="picks.js"></script>
<script src="firebase-config.js"></script>
<script src="net.js"></script>
<script src="lobby.js"></script>
<script src="draftui.js"></script>
</body>
</html>
